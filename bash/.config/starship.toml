# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Use the color palette
palette = "dracula"

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

[character]
error_symbol = "[λ](bold red)"
success_symbol = "[λ](bold green)"

[cmd_duration]
style = "bold yellow"

[direnv]
symbol = " "

[directory]
read_only = " 󰌾"
style = "bold green"

[docker_context]
symbol = " "

[dotnet]
symbol = " "

[git_branch]
style = "bold pink"
symbol = " "

[git_commit]
tag_symbol = '  '

[git_status]
deleted = ''
modified = ''
renamed = ''
staged = ''
stashed = ''
style = "bold red"
untracked = ''

[hostname]
ssh_symbol = " "
style = "bold purple"

[nodejs]
symbol = " "

[status]
symbol = " "

[username]
format = "[$user]($style) on "
style_user = "bold cyan"
